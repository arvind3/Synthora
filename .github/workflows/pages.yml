name: Build Test Deploy Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "web/**"
      - "catalog_build/**"
      - "docs/**"
      - "plugin_packs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json

      - name: Install Python dependencies
        run: python -m pip install -r catalog_build/requirements.txt

      - name: Build catalog
        run: python catalog_build/build_catalog.py

      - name: Run Python tests
        run: pytest catalog_build/tests

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Fetch Pyodide runtime
        working-directory: web
        run: npm run pyodide:fetch

      - name: Fetch wheel bundle
        working-directory: web
        run: npm run wheels:fetch

      - name: Generate documentation pages
        run: |
          mkdir -p web/public/docs
          # Place documentation HTML pages into web/public/docs/ so Vite includes
          # them in the build output at /Synthora/docs/.
          # To run a docs skill or generator, replace the placeholder below:
          #   python docs_skill/generate.py --output web/public/docs/
          # If web/public/docs/ already contains pre-committed HTML files, this
          # step is a no-op and the files are picked up by Vite automatically.
          echo "Documentation directory ready at web/public/docs/"

      - name: Run frontend tests
        working-directory: web
        run: npm run test

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        working-directory: web
        continue-on-error: true
        run: npm run e2e

      - name: Build frontend
        working-directory: web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
